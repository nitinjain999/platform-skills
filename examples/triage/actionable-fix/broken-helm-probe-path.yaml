# Example: wrong liveness probe path — triggers ACTIONABLE_FIX
#
# Reviewer comment: "The liveness probe hits /healthz but the app only
# exposes /health. This will always 404 and restart the pod in a loop."
#
# Expected triage fix: change /healthz → /health

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: checkout
  labels:
    app.kubernetes.io/name: payments
    app.kubernetes.io/team: checkout
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: payments
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments
    spec:
      containers:
        - name: payments
          image: payments:2.0.1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz   # ❌ wrong — app exposes /health, triage corrects this
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
