apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "payments-api.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "payments-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command: ['wget']
      args: ['-qO-', '{{ include "payments-api.fullname" . }}:{{ .Values.service.port }}/healthz']
  restartPolicy: Never
