# Prometheus Agent — Helm values for scraping Pushgateway and remote_writing to AMP.
# Runs in agent mode (no local storage, no querying) — only scrape + remote_write.
#
# Chart: prometheus-community/prometheus
# Version: >= 25.0.0
# Install:
#   helm upgrade --install prometheus-agent prometheus-community/prometheus \
#     --namespace monitoring --create-namespace \
#     -f examples/dora/amp-variant/prometheus-agent-values.yaml
#
# Prerequisites:
#   - IRSA or Pod Identity attached to the prometheus-agent ServiceAccount
#     with policy: AmazonPrometheusRemoteWriteAccess
#   - AMP workspace ID set in remoteWrite.url below

# Run as a Prometheus Agent — disables local TSDB and query API.
# This is the recommended mode when the only goal is remote_write.
server:
  agentMode: true

  # Replace <workspace-id> and <region> with your AMP workspace values.
  remoteWrite:
    - url: https://aps-workspaces.eu-central-1.amazonaws.com/workspaces/<workspace-id>/api/v1/remote_write
      sigv4:
        region: eu-central-1
        # Uses the pod's IAM role (IRSA or Pod Identity) — no static credentials.
      queue_config:
        max_samples_per_send: 1000
        max_shards: 5
        capacity: 2500

  # Only scrape the Pushgateway — do not autodiscover other targets.
  # This keeps the agent focused and reduces AMP ingest cost.
  scrape_configs:
    - job_name: dora-pushgateway
      honor_labels: true    # preserve job/instance labels pushed by GitHub Actions
      static_configs:
        - targets:
            - pushgateway.monitoring.svc.cluster.local:9091

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Disable local persistence — agent mode does not need it.
  persistentVolume:
    enabled: false

# Disable all components except the server (agent).
alertmanager:
  enabled: false
kube-state-metrics:
  enabled: false
prometheus-node-exporter:
  enabled: false
prometheus-pushgateway:
  enabled: false    # Pushgateway is deployed separately via pushgateway-helm-values.yaml

serviceAccounts:
  server:
    # Annotate with the IRSA role ARN for AMP remote_write access.
    # Replace <account-id> with your AWS account ID.
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/prometheus-amp-remote-write
