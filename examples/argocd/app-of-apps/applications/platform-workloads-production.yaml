apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-workloads-production
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://github.com/nitinjain999/platform-skills
    targetRevision: main
    path: apps/production
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
