---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: 'v1.14.4'
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
      interval: 12h
  maxHistory: 3
  install:
    crds: Create
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  uninstall:
    keepHistory: false
  values:
    installCRDs: true
    replicaCount: 2
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    prometheus:
      enabled: false  # Enable if Prometheus is installed
