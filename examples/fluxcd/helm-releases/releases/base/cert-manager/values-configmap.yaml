apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-values
  namespace: cert-manager
  labels:
    reconcile.fluxcd.io/watch: Enabled   # triggers immediate HelmRelease reconciliation on change
data:
  values.yaml: |
    installCRDs: true
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
