apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: team-a
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 5m
  serviceAccountName: team-a      # RBAC-isolated to team-a namespace
  targetNamespace: team-a
  sourceRef:
    kind: GitRepository
    name: team-a-app
  path: ./deploy
