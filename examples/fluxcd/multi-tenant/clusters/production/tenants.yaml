apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenants
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true
  timeout: 3m
  dependsOn:
    - name: platform          # ClusterRole and NetworkPolicies must exist before tenant RBAC
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./tenants
