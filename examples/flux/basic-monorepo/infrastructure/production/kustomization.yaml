---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  - target:
      kind: HelmRelease
      name: ingress-nginx
    patch: |-
      - op: replace
        path: /spec/values/controller/replicaCount
        value: 3
      - op: add
        path: /spec/values/controller/resources/limits/cpu
        value: "1000m"
  - target:
      kind: HelmRelease
      name: cert-manager
    patch: |-
      - op: replace
        path: /spec/values/replicaCount
        value: 3
