apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-app-sa
  namespace: my-app
  annotations:
    # client-id comes from the Terraform output: azurerm_user_assigned_identity.workload.client_id
    azure.workload.identity/client-id: "<client-id>"
  labels:
    azure.workload.identity/use: "true"
