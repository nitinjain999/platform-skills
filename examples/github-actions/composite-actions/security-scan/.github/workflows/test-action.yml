name: Test security-scan action

on:
  push:
    paths:
      - 'action.yml'
      - '.github/workflows/test-action.yml'
  pull_request:
    paths:
      - 'action.yml'

# act usage:
#   act -W .github/workflows/test-action.yml \
#       -P ubuntu-latest=catthehacker/ubuntu:act-22.04

permissions:
  contents: read

jobs:
  # Test 1 — invalid severity level fails
  test-invalid-severity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run with invalid severity — expect failure
        id: scan
        uses: ./
        with:
          scan_target: alpine:latest
          severity: 'BLOCKER'   # not a valid Trivy severity
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.scan.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure for invalid severity"; exit 1; }

  # Test 2 — scan public image, don't fail on findings
  test-scan-public-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Scan alpine — findings expected, but not failing
        id: scan
        uses: ./
        with:
          scan_target: alpine:3.18
          scan_type: image
          severity: HIGH,CRITICAL
          fail_on_findings: 'false'    # observe only

      - name: Verify scan outputs
        shell: bash
        run: |
          echo "vuln_count=${{ steps.scan.outputs.vulnerability_count }}"
          echo "result=${{ steps.scan.outputs.scan_result }}"
          [[ "${{ steps.scan.outputs.scan_result }}" == "pass" ]] || \
            { echo "::error::Expected pass with fail_on_findings=false"; exit 1; }

  # Test 3 — filesystem scan
  test-fs-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Scan filesystem
        id: scan
        uses: ./
        with:
          scan_target: .
          scan_type: fs
          severity: CRITICAL
          fail_on_findings: 'false'
        continue-on-error: true   # repo may or may not have findings

      - name: Verify scan ran
        shell: bash
        run: |
          echo "result=${{ steps.scan.outputs.scan_result }}"
          [[ -n "${{ steps.scan.outputs.scan_result }}" ]] || \
            { echo "::error::scan_result output not set"; exit 1; }

  # Test 4 — matrix: scan_type variants
  test-scan-type-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scan_type: [image, fs]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Scan with type=${{ matrix.scan_type }}
        uses: ./
        with:
          scan_target: ${{ matrix.scan_type == 'image' && 'alpine:latest' || '.' }}
          scan_type: ${{ matrix.scan_type }}
          fail_on_findings: 'false'
