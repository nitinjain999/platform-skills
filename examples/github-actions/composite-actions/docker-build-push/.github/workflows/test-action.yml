name: Test docker-build-push action

on:
  push:
    paths:
      - 'action.yml'
      - 'scripts/**'
      - '.github/workflows/test-action.yml'
  pull_request:
    paths:
      - 'action.yml'
      - 'scripts/**'
      - '.github/workflows/test-action.yml'

# act usage:
#   act -W .github/workflows/test-action.yml \
#       -P ubuntu-latest=catthehacker/ubuntu:act-22.04

jobs:
  # Test 1 — defaults only (linux/amd64, no push)
  test-defaults:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run action with defaults (no push)
        id: build
        uses: ./    # local path — tests the branch under review
        with:
          image_name: test-image
          push: 'false'

      - name: Verify outputs are set
        shell: bash
        run: |
          echo "image_uri=${{ steps.build.outputs.image_uri }}"
          echo "image_tag=${{ steps.build.outputs.image_tag }}"
          [[ -n "${{ steps.build.outputs.image_uri }}" ]] || { echo "::error::image_uri is empty"; exit 1; }
          [[ -n "${{ steps.build.outputs.image_tag }}" ]] || { echo "::error::image_tag is empty"; exit 1; }
          IMAGE_TAG="${{ steps.build.outputs.image_tag }}"
          [[ ${#IMAGE_TAG} -le 7 ]] || echo "::warning::image_tag longer than 7 chars"

  # Test 2 — multi-platform build (no push)
  test-multiplatform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build multi-platform (no push)
        id: build
        uses: ./
        with:
          image_name: test-image-multi
          platforms: linux/amd64,linux/arm64
          push: 'false'

      - name: Verify platform outputs
        shell: bash
        run: |
          echo "image_tag: ${{ steps.build.outputs.image_tag }}"
          [[ -n "${{ steps.build.outputs.image_tag }}" ]] || { echo "::error::image_tag is empty"; exit 1; }

  # Test 3 — invalid image_name should fail
  test-validation-failure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run with invalid image_name — expect failure
        id: build
        uses: ./
        with:
          image_name: 'UPPERCASE_INVALID'
          push: 'false'
        continue-on-error: true

      - name: Assert that the action failed
        shell: bash
        run: |
          if [[ "${{ steps.build.outcome }}" != "failure" ]]; then
            echo "::error::Expected action to fail with invalid image_name but it succeeded"
            exit 1
          fi
          echo "::notice::Validation correctly rejected invalid image_name"

  # Test 4 — custom Dockerfile and context
  test-custom-dockerfile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build with explicit dockerfile path
        uses: ./
        with:
          image_name: test-custom-df
          dockerfile: Dockerfile
          context: .
          push: 'false'
