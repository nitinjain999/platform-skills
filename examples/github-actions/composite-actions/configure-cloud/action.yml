name: 'Configure Cloud Credentials'
description: 'Configure AWS, Azure, or GCP credentials using OIDC — no long-lived secrets'
author: 'Platform Team'

inputs:
  cloud_provider:
    description: 'Cloud provider: aws | azure | gke'
    required: true
  aws_role_arn:
    description: 'AWS IAM role ARN to assume via OIDC (required when cloud_provider=aws)'
    required: false
  aws_region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'
  azure_client_id:
    description: 'Azure app registration client ID for federated credentials (required when cloud_provider=azure)'
    required: false
  azure_tenant_id:
    description: 'Azure AD tenant ID (required when cloud_provider=azure)'
    required: false
  azure_subscription_id:
    description: 'Azure subscription ID (required when cloud_provider=azure)'
    required: false
  gcp_workload_identity_provider:
    description: 'WIF provider resource name (required when cloud_provider=gke) — projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER'
    required: false
  gcp_service_account:
    description: 'GCP service account email to impersonate via WIF (required when cloud_provider=gke)'
    required: false
  gcp_project:
    description: 'GCP project ID (required when cloud_provider=gke)'
    required: false
  gcp_cluster_name:
    description: 'GKE cluster name (required when cloud_provider=gke)'
    required: false
  gcp_cluster_location:
    description: 'GKE cluster region or zone, e.g. us-central1 or us-central1-a (required when cloud_provider=gke)'
    required: false

outputs:
  cloud_provider:
    description: 'The configured cloud provider (aws, azure, or gke)'
    value: ${{ inputs.cloud_provider }}
  aws_account_id:
    description: 'AWS account ID — empty string when cloud_provider is not aws'
    value: ${{ steps.aws_config.outputs.aws-account-id }}

runs:
  using: 'composite'
  steps:
    # Validate inputs before doing anything
    - name: Validate inputs
      shell: bash
      env:
        CLOUD_PROVIDER: ${{ inputs.cloud_provider }}
        AWS_ROLE_ARN: ${{ inputs.aws_role_arn }}
        AZURE_CLIENT_ID: ${{ inputs.azure_client_id }}
        AZURE_TENANT_ID: ${{ inputs.azure_tenant_id }}
        AZURE_SUBSCRIPTION_ID: ${{ inputs.azure_subscription_id }}
        GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ inputs.gcp_workload_identity_provider }}
        GCP_SERVICE_ACCOUNT: ${{ inputs.gcp_service_account }}
        GCP_PROJECT: ${{ inputs.gcp_project }}
        GCP_CLUSTER_NAME: ${{ inputs.gcp_cluster_name }}
        GCP_CLUSTER_LOCATION: ${{ inputs.gcp_cluster_location }}
      run: |
        case "$CLOUD_PROVIDER" in
          aws)
            [[ -n "$AWS_ROLE_ARN" ]] || \
              { echo "::error::aws_role_arn is required when cloud_provider=aws"; exit 1; }
            ;;
          azure)
            [[ -n "$AZURE_CLIENT_ID" ]] || \
              { echo "::error::azure_client_id is required when cloud_provider=azure"; exit 1; }
            [[ -n "$AZURE_TENANT_ID" ]] || \
              { echo "::error::azure_tenant_id is required when cloud_provider=azure"; exit 1; }
            [[ -n "$AZURE_SUBSCRIPTION_ID" ]] || \
              { echo "::error::azure_subscription_id is required when cloud_provider=azure"; exit 1; }
            ;;
          gke)
            [[ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]] || \
              { echo "::error::gcp_workload_identity_provider is required when cloud_provider=gke"; exit 1; }
            [[ -n "$GCP_SERVICE_ACCOUNT" ]] || \
              { echo "::error::gcp_service_account is required when cloud_provider=gke"; exit 1; }
            [[ -n "$GCP_PROJECT" ]] || \
              { echo "::error::gcp_project is required when cloud_provider=gke"; exit 1; }
            [[ -n "$GCP_CLUSTER_NAME" ]] || \
              { echo "::error::gcp_cluster_name is required when cloud_provider=gke"; exit 1; }
            [[ -n "$GCP_CLUSTER_LOCATION" ]] || \
              { echo "::error::gcp_cluster_location is required when cloud_provider=gke"; exit 1; }
            ;;
          *)
            echo "::error::cloud_provider must be 'aws', 'azure', or 'gke', got: $CLOUD_PROVIDER"
            exit 1
            ;;
        esac

    # AWS path
    - name: Configure AWS credentials via OIDC
      if: inputs.cloud_provider == 'aws'
      id: aws_config
      uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: github-actions-${{ github.run_id }}
        mask-aws-account-id: false

    - name: Verify AWS credentials
      if: inputs.cloud_provider == 'aws'
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws_region }}
      run: |
        echo "::group::AWS identity"
        aws sts get-caller-identity
        echo "Region: $AWS_REGION"
        echo "::endgroup::"

    # Azure path
    - name: Configure Azure credentials via OIDC
      if: inputs.cloud_provider == 'azure'
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: Verify Azure credentials
      if: inputs.cloud_provider == 'azure'
      shell: bash
      run: |
        echo "::group::Azure identity"
        az account show --output table
        echo "::endgroup::"

    # GKE path
    - name: Authenticate to GCP via Workload Identity Federation
      if: inputs.cloud_provider == 'gke'
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2.1.13
      with:
        workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
        service_account: ${{ inputs.gcp_service_account }}

    - name: Verify GCP credentials
      if: inputs.cloud_provider == 'gke'
      shell: bash
      run: |
        echo "::group::GCP identity"
        gcloud auth list
        echo "::endgroup::"

    # Job summary
    - name: Write job summary
      if: always()
      shell: bash
      env:
        CLOUD_PROVIDER: ${{ inputs.cloud_provider }}
        AWS_REGION: ${{ inputs.aws_region }}
        AZURE_SUBSCRIPTION: ${{ inputs.azure_subscription_id }}
        GCP_PROJECT: ${{ inputs.gcp_project }}
      run: |
        {
          echo "## Cloud Credentials"
          echo "| Key | Value |"
          echo "|---|---|"
          echo "| Provider | \`$CLOUD_PROVIDER\` |"
          case "$CLOUD_PROVIDER" in
            aws)   echo "| Region | \`$AWS_REGION\` |" ;;
            azure) echo "| Subscription | \`$AZURE_SUBSCRIPTION\` |" ;;
            gke)   echo "| Project | \`$GCP_PROJECT\` |" ;;
          esac
          echo "| Auth method | OIDC (no long-lived secrets) |"
        } >> "$GITHUB_STEP_SUMMARY"

branding:
  icon: 'cloud'
  color: 'blue'
