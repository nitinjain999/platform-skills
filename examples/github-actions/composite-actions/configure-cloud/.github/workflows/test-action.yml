name: Test configure-cloud action

on:
  push:
    paths:
      - 'action.yml'
      - '.github/workflows/test-action.yml'
  pull_request:
    paths:
      - 'action.yml'

# act usage:
#   act -W .github/workflows/test-action.yml \
#       -P ubuntu-latest=catthehacker/ubuntu:act-22.04

permissions:
  contents: read

jobs:
  # Test 1 — invalid provider fails
  test-invalid-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run with invalid provider — expect failure
        id: cloud
        uses: ./
        with:
          cloud_provider: gcp
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.cloud.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure for invalid cloud_provider=gcp"; exit 1; }

  # Test 2 — AWS without role_arn fails
  test-missing-aws-role:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run AWS without role_arn — expect failure
        id: cloud
        uses: ./
        with:
          cloud_provider: aws
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.cloud.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure when aws_role_arn is missing"; exit 1; }

  # Test 3 — Azure without client_id fails
  test-missing-azure-client-id:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Azure without client_id — expect failure
        id: cloud
        uses: ./
        with:
          cloud_provider: azure
          azure_tenant_id: dummy-tenant
          azure_subscription_id: dummy-sub
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.cloud.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure when azure_client_id is missing"; exit 1; }

  # Test 4 — Azure without tenant_id fails
  test-missing-azure-tenant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Azure without tenant_id — expect failure
        id: cloud
        uses: ./
        with:
          cloud_provider: azure
          azure_client_id: dummy-client
          azure_subscription_id: dummy-sub
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.cloud.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure when azure_tenant_id is missing"; exit 1; }
