name: Test setup-env action

on:
  push:
    paths:
      - 'action.yml'
      - '.github/workflows/test-action.yml'
  pull_request:
    paths:
      - 'action.yml'

# act usage:
#   act -W .github/workflows/test-action.yml \
#       -P ubuntu-latest=catthehacker/ubuntu:act-22.04

jobs:
  # Test 1 — invalid runtime fails
  test-invalid-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run with invalid runtime — expect failure
        id: setup
        uses: ./
        with:
          runtime: ruby
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.setup.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure for invalid runtime"; exit 1; }

  # Test 2 — matrix across all runtimes and versions
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node
            version: '20.x'
            check_cmd: 'node --version'
          - runtime: node
            version: '22.x'
            check_cmd: 'node --version'
          - runtime: python
            version: '3.12'
            check_cmd: 'python --version'
          - runtime: python
            version: '3.11'
            check_cmd: 'python --version'
          - runtime: go
            version: '1.22.x'
            check_cmd: 'go version'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup ${{ matrix.runtime }} ${{ matrix.version }}
        id: setup
        uses: ./
        with:
          runtime: ${{ matrix.runtime }}
          version: ${{ matrix.version }}
          install_dependencies: 'false'   # no project deps in test repo

      - name: Verify runtime installed
        shell: bash
        run: |
          ${{ matrix.check_cmd }}
          echo "runtime_version=${{ steps.setup.outputs.runtime_version }}"
          [[ -n "${{ steps.setup.outputs.runtime_version }}" ]] || \
            { echo "::error::runtime_version output is empty"; exit 1; }

  # Test 3 — default version (no version specified)
  test-default-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, python, go]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Setup ${{ matrix.runtime }} with default version
        id: setup
        uses: ./
        with:
          runtime: ${{ matrix.runtime }}
          install_dependencies: 'false'
      - name: Verify version output set
        shell: bash
        run: |
          [[ -n "${{ steps.setup.outputs.runtime_version }}" ]] || \
            { echo "::error::runtime_version not set for ${{ matrix.runtime }}"; exit 1; }
          echo "${{ matrix.runtime }} installed: ${{ steps.setup.outputs.runtime_version }}"

  # Test 4 — cache disabled
  test-no-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Setup node without cache
        id: setup
        uses: ./
        with:
          runtime: node
          enable_cache: 'false'
          install_dependencies: 'false'
      - name: Verify cache_hit is false
        shell: bash
        run: |
          echo "cache_hit=${{ steps.setup.outputs.cache_hit }}"
          # cache_hit should be empty or false when cache is disabled
          [[ "${{ steps.setup.outputs.cache_hit }}" != "true" ]] || \
            echo "::warning::cache_hit=true even though enable_cache=false"
