name: Test k8s-deploy action

on:
  push:
    paths:
      - 'action.yml'
      - 'scripts/**'
      - '.github/workflows/test-action.yml'
  pull_request:
    paths:
      - 'action.yml'
      - 'scripts/**'

# act usage:
#   act -W .github/workflows/test-action.yml \
#       -P ubuntu-latest=catthehacker/ubuntu:act-22.04

jobs:
  # Test 1 — empty namespace should fail
  test-missing-namespace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run with missing namespace — expect failure
        id: deploy
        uses: ./
        with:
          kubeconfig: 'dGVzdA=='   # valid base64 but not a real kubeconfig
          namespace: ''
          manifest_path: 'deploy/'
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.deploy.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure for empty namespace"; exit 1; }
          echo "::notice::Validation correctly rejected empty namespace"

  # Test 2 — invalid base64 kubeconfig should fail
  test-invalid-kubeconfig-base64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run with invalid base64 — expect failure
        id: deploy
        uses: ./
        with:
          kubeconfig: 'not-valid-base64!!!'
          namespace: production
          manifest_path: 'deploy/'
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.deploy.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure for invalid base64"; exit 1; }
          echo "::notice::Validation correctly rejected invalid base64"

  # Test 3 — invalid timeout format should fail
  test-invalid-timeout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run with invalid timeout — expect failure
        id: deploy
        uses: ./
        with:
          kubeconfig: 'dGVzdA=='
          namespace: production
          manifest_path: 'deploy/'
          timeout: '5minutes'   # invalid format — should be 5m
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.deploy.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure for invalid timeout format"; exit 1; }
          echo "::notice::Validation correctly rejected invalid timeout"

  # Test 4 — valid input format passes validation step
  test-input-validation-passes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Validate inputs pass — action will fail at kubectl install/connect step
        id: deploy
        uses: ./
        with:
          kubeconfig: ${{ toJSON('apiVersion: v1\nkind: Config') | toJSON }}
          namespace: production
          manifest_path: deploy/
          timeout: 5m
          dry_run: 'true'
        continue-on-error: true
      - name: Assert input validation passed (failure is ok at kubectl step)
        shell: bash
        run: |
          # Outcome may be failure (no real cluster) but we confirm it was not
          # the validation step that failed by checking the step summary was started
          echo "::notice::Outcome: ${{ steps.deploy.outcome }} — expected failure at kubectl, not validation"
