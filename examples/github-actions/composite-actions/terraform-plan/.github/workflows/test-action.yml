name: Test terraform-plan action

on:
  push:
    paths:
      - 'action.yml'
      - '.github/workflows/test-action.yml'
  pull_request:
    paths:
      - 'action.yml'

# act usage:
#   act -W .github/workflows/test-action.yml \
#       -P ubuntu-latest=catthehacker/ubuntu:act-22.04 \
#       --secret GITHUB_TOKEN=$GITHUB_TOKEN

permissions:
  contents: read

jobs:
  # Test 1 — missing working_directory fails
  test-missing-working-dir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run with empty working_directory — expect failure
        id: plan
        uses: ./
        with:
          working_directory: ''
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.plan.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure for empty working_directory"; exit 1; }

  # Test 2 — Azure client_id without tenant_id fails
  test-azure-missing-tenant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run with azure_client_id but no tenant_id — expect failure
        id: plan
        uses: ./
        with:
          working_directory: .
          github_token: ${{ secrets.GITHUB_TOKEN }}
          azure_client_id: fake-client-id
          azure_tenant_id: ''
          azure_subscription_id: ''
        continue-on-error: true
      - name: Assert failure
        shell: bash
        run: |
          [[ "${{ steps.plan.outcome }}" == "failure" ]] || \
            { echo "::error::Expected failure for Azure missing tenant_id"; exit 1; }

  # Test 3 — fmt check on sample Terraform in the repo
  test-terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Create minimal Terraform for testing
        shell: bash
        run: |
          mkdir -p /tmp/tf-test
          cat > /tmp/tf-test/main.tf << 'EOF'
          terraform {
            required_version = ">= 1.9.0"
          }

          output "hello" {
            value = "world"
          }
          EOF

      - name: Run plan on minimal Terraform (no cloud — local state)
        id: plan
        uses: ./
        with:
          working_directory: /tmp/tf-test
          github_token: ${{ secrets.GITHUB_TOKEN }}
          comment_on_pr: 'false'
        continue-on-error: true   # may fail on apply step without backend

      - name: Verify plan ran (exitcode output set)
        shell: bash
        run: |
          echo "plan exitcode: ${{ steps.plan.outputs.plan_exitcode }}"
          echo "has_changes: ${{ steps.plan.outputs.has_changes }}"
