# Litmus ChaosEngine: pod-delete experiment with HTTP steady-state probe
# Target: Deployment with label app=my-service in namespace my-namespace
# Duration: 60s, deletes 50% of matching pods every 15s
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-delete-engine
  namespace: my-namespace
spec:
  appinfo:
    appns: my-namespace
    applabel: "app=my-service"
    appkind: deployment
  chaosServiceAccount: litmus-admin
  jobCleanUpPolicy: retain
  experiments:
  - name: pod-delete
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "60"
        - name: CHAOS_INTERVAL
          value: "15"
        - name: FORCE
          value: "false"
        - name: PODS_AFFECTED_PERC
          value: "50"
      probe:
      - name: check-api-health
        type: httpProbe
        httpProbe/inputs:
          url: http://my-service.my-namespace.svc.cluster.local/healthz
          insecureSkipVerify: false
          method:
            get:
              criteria: ==
              responseCode: "200"
        mode: Continuous
        runProperties:
          probeTimeout: 5000
          interval: 2000
          attempt: 3
          probePollingInterval: 2000
