# generated by platform-skills
# Copilot App setup steps — runs in the agent's cloud worktree before each session.
# SHA-pin every action: fetch the commit SHA for the release tag before merging.
#
# Fetch SHA for a tag (use highest stable tag, e.g. v4):
#   gh api repos/actions/checkout/git/ref/tags/v4 --jq '.object.sha'
#   gh api repos/hashicorp/setup-terraform/git/ref/tags/v3 --jq '.object.sha'
# If the tag is annotated (object.type == "tag"), follow the dereference URL for the commit SHA.

steps:
  - name: Checkout
    uses: actions/checkout@__CHECKOUT_SHA__  # v__CHECKOUT_VERSION__

  # Terraform (include if IaC detected — remove block otherwise)
  - name: Setup Terraform
    uses: hashicorp/setup-terraform@__SETUP_TERRAFORM_SHA__  # v__SETUP_TERRAFORM_VERSION__
    with:
      terraform_version: "__TERRAFORM_VERSION__"

  # AWS credentials (include if AWS deploy detected — remove block otherwise)
  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@__CONFIGURE_AWS_SHA__  # v__CONFIGURE_AWS_VERSION__
    with:
      role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      aws-region: ${{ secrets.AWS_REGION }}

  # Node.js (include if Node detected — remove block otherwise)
  - name: Setup Node.js
    uses: actions/setup-node@__SETUP_NODE_SHA__  # v__SETUP_NODE_VERSION__
    with:
      node-version: "__NODE_VERSION__"
      cache: "npm"

  # Python (include if Python detected — remove block otherwise)
  - name: Setup Python
    uses: actions/setup-python@__SETUP_PYTHON_SHA__  # v__SETUP_PYTHON_VERSION__
    with:
      python-version: "__PYTHON_VERSION__"
      cache: "pip"

  # Java/Kotlin/Spring Boot (include if JVM detected — remove block otherwise)
  - name: Setup Java
    uses: actions/setup-java@__SETUP_JAVA_SHA__  # v__SETUP_JAVA_VERSION__
    with:
      distribution: "temurin"
      java-version: "__JAVA_VERSION__"
      cache: "gradle"
