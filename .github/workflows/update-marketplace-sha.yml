name: Update Marketplace SHA

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-sha:
    name: Update source.sha in marketplace.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Use a PAT or the default token with write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update source.sha to current HEAD
        id: update
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          STORED_SHA=$(jq -r '.plugins[0].source.sha' .claude-plugin/marketplace.json)

          echo "Current HEAD:  ${CURRENT_SHA}"
          echo "Stored SHA:    ${STORED_SHA}"

          if [ "$CURRENT_SHA" = "$STORED_SHA" ]; then
            echo "✅ source.sha is already current — nothing to do"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          jq --arg sha "$CURRENT_SHA" '.plugins[0].source.sha = $sha' \
            .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          echo "changed=true" >> $GITHUB_OUTPUT
          echo "sha=${CURRENT_SHA}" >> $GITHUB_OUTPUT
          echo "📝 Updated source.sha to ${CURRENT_SHA}"

      - name: Commit updated marketplace.json
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: update marketplace.json source.sha to ${{ steps.update.outputs.sha }}"
          git push
          echo "✅ Committed source.sha update"
