name: Regen demo GIFs

on:
  push:
    branches: [main]
    paths:
      - 'examples/demo/**/demo.tape'
  pull_request:
    paths:
      - 'examples/demo/**/demo.tape'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # For fork PRs: check out from the fork repo at the PR head SHA
          # For push to main: use default checkout (github.sha)
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: charmbracelet/vhs-action@v2.1.0

      - name: Generate GIFs
        run: |
          for tape in examples/demo/**/demo.tape; do
            echo "Rendering $tape"
            dir=$(dirname "$tape")
            (cd "$dir" && vhs demo.tape)
          done

      - name: Commit updated GIFs
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore: regenerate demo GIFs [skip ci]"
          file_pattern: "examples/demo/**/*.gif"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
