name: Tessl Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.26.15)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      - name: Set version in tile.json
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' tile.json > tile.json.tmp && mv tile.json.tmp tile.json
      - name: Publish skill
        run: tessl tile publish .
