name: Tessl Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skills/platform-skills/**'
      - 'references/**'
      - 'commands/**'
      - 'examples/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      - name: Publish skill
        run: tessl tile publish skills/platform-skills
