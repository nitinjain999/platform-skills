name: Tessl Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'tile.json'
      - 'skills/platform-skills/**'
      - 'references/**'
      - 'commands/**'
      - 'examples/**'
      - 'evals/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      - name: Publish skill
        run: tessl tile publish . --skip-evals --bump patch
      - name: Run eval scenarios
        run: |
          tessl project create platform-skills --workspace nitinjain999 || true
          tessl eval run . --label "ci-${{ github.sha }}" || echo "⚠ Eval run failed (Tessl server-side 500) — publish succeeded"
