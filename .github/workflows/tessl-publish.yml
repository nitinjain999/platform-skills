name: Tessl Publish

on:
  push:
    branches: [main]
    paths:
      - 'skills/platform-skills/**'
      - 'references/**'
      - 'commands/**'
      - 'examples/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: tesslio/patch-version-publish@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}
          path: skills/platform-skills
