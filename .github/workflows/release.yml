name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: read
  id-token: write

env:
  SKILL_NAME: platform-skills

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog_exists: ${{ steps.check.outputs.changelog_exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Releasing version: ${VERSION}"

      - name: Ensure tagged commit is on main
        run: |
          git fetch origin main --depth=1
          TAG_COMMIT=$(git rev-parse HEAD)
          MAIN_COMMIT=$(git rev-parse origin/main)

          if ! git merge-base --is-ancestor "$TAG_COMMIT" "$MAIN_COMMIT"; then
            echo "❌ Release tags must point to commits that are reachable from origin/main"
            echo "Tagged commit: ${TAG_COMMIT}"
            echo "origin/main: ${MAIN_COMMIT}"
            exit 1
          fi

          echo "✅ Tagged commit is reachable from origin/main"

      - name: Validate version format
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: ${VERSION}"
            echo "Version must follow semver: MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "✅ Version format valid: ${VERSION}"

      - name: Check marketplace.json version matches tag
        run: |
          MARKETPLACE_VERSION=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          TAG_VERSION=${{ steps.version.outputs.version }}

          if [ "$MARKETPLACE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "marketplace.json version: ${MARKETPLACE_VERSION}"
            echo "Git tag version: ${TAG_VERSION}"
            exit 1
          fi
          echo "✅ Versions match: ${TAG_VERSION}"

      - name: Validate marketplace.json structure
        run: |
          jq -e '
            (.name | type == "string" and length > 0) and
            (.owner.name | type == "string" and length > 0) and
            (.plugins | type == "array" and length > 0) and
            (.plugins[0].name | type == "string" and length > 0) and
            (.plugins[0].version | type == "string" and length > 0) and
            (.plugins[0].description | type == "string" and length > 0) and
            (.plugins[0].author.name | type == "string" and length > 0) and
            (.plugins[0].license | type == "string" and length > 0) and
            (.plugins[0].source.url | type == "string" and length > 0) and
            (.plugins[0].homepage | type == "string" and length > 0)
          ' .claude-plugin/marketplace.json > /dev/null

          ROOT_NAME=$(jq -r '.name' .claude-plugin/marketplace.json)
          PLUGIN_NAME=$(jq -r '.plugins[0].name' .claude-plugin/marketplace.json)
          if [ "$ROOT_NAME" != "$PLUGIN_NAME" ]; then
            echo "❌ Top-level name and plugins[0].name must match"
            echo "Top-level name: ${ROOT_NAME}"
            echo "Plugin name: ${PLUGIN_NAME}"
            exit 1
          fi

          echo "✅ marketplace.json structure valid"

      - name: Check required files exist
        id: check
        run: |
          REQUIRED_FILES=(
            "SKILL.md"
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
            ".claude-plugin/marketplace.json"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Required file missing: $file"
              exit 1
            fi
          done

          echo "✅ All required files present"
          echo "changelog_exists=true" >> $GITHUB_OUTPUT

      - name: Check CHANGELOG.md has entry for this version
        if: steps.check.outputs.changelog_exists == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "⚠️  Warning: No CHANGELOG entry found for version ${VERSION}"
            echo "Consider adding release notes to CHANGELOG.md"
          else
            echo "✅ CHANGELOG entry found for ${VERSION}"
          fi

      - name: Validate no secrets in code
        run: |
          # Check for common secret patterns
          POTENTIAL_SECRETS=$(grep -rE '(password|secret|key|token|apikey).*=.*["\x27][^"\x27]{8,}["\x27]' \
             --exclude-dir=.git \
             --exclude-dir=node_modules \
             --exclude="*.md" \
             --exclude="CHANGELOG.md" . | \
             grep -v 'matrix\.' | \
             grep -v 'vars\.' | \
             grep -v 'secrets\.' | \
             grep -v 'backend-config=' || true)

          if [ -n "$POTENTIAL_SECRETS" ]; then
            echo "⚠️  Potential secrets found in code:"
            echo "$POTENTIAL_SECRETS"
            echo "Review above matches before release"
            exit 1
          fi
          echo "✅ No obvious secrets detected"

  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check markdown files
        run: |
          # Find all markdown files
          MD_FILES=$(find . -type f -name "*.md" ! -path "./.git/*" | wc -l)
          echo "📄 Found ${MD_FILES} markdown files"

          # Basic markdown validation
          for file in $(find . -type f -name "*.md" ! -path "./.git/*"); do
            if [ ! -s "$file" ]; then
              echo "⚠️  Empty file: $file"
            fi
          done

          echo "✅ Markdown files checked"

      - name: Validate YAML files
        run: |
          # Install yq for YAML validation
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Validate all YAML files
          YAML_FILES=$(find . -type f \( -name "*.yml" -o -name "*.yaml" \) ! -path "./.git/*")

          if [ -n "$YAML_FILES" ]; then
            while IFS= read -r file; do
              if ! yq eval '.' "$file" > /dev/null 2>&1; then
                echo "❌ Invalid YAML: $file"
                exit 1
              fi
            done <<< "$YAML_FILES"
            echo "✅ All YAML files valid"
          else
            echo "ℹ️  No YAML files found"
          fi

      - name: Validate JSON files
        run: |
          # Validate all JSON files
          JSON_FILES=$(find . -type f -name "*.json" ! -path "./.git/*" ! -path "./node_modules/*")

          if [ -n "$JSON_FILES" ]; then
            while IFS= read -r file; do
              if ! jq empty "$file" 2>/dev/null; then
                echo "❌ Invalid JSON: $file"
                exit 1
              fi
            done <<< "$JSON_FILES"
            echo "✅ All JSON files valid"
          else
            echo "ℹ️  No JSON files found"
          fi

      - name: Check for broken internal links
        run: |
          # Simple check for broken markdown links to local files
          for file in $(find . -type f -name "*.md" ! -path "./.git/*"); do
            # Extract relative links
            LINKS=$(grep -oP '\[.*?\]\(\K[^)#]+(?=[#)]?[)]?)' "$file" | grep -v "^http" | grep -v "^#" || true)

            if [ -n "$LINKS" ]; then
              while IFS= read -r link; do
                DIR=$(dirname "$file")
                TARGET="${DIR}/${link}"

                # Normalize path
                TARGET=$(realpath -m "$TARGET" 2>/dev/null || echo "$TARGET")

                if [[ "$link" != *"://"* ]] && [ ! -e "$TARGET" ]; then
                  echo "⚠️  Potentially broken link in $file: $link -> $TARGET"
                fi
              done <<< "$LINKS"
            fi
          done

          echo "✅ Internal links checked"

      - name: Validate Terraform files (if present)
        run: |
          if find . -type f -name "*.tf" ! -path "./.git/*" | grep -q .; then
            # Install terraform
            wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt-get update && sudo apt-get install -y terraform

            # Validate all terraform directories
            ERRORS=0
            for dir in $(find . -type f -name "*.tf" ! -path "./.git/*" -exec dirname {} \; | sort -u); do
              echo "Validating Terraform in: $dir"
              if ! (cd "$dir" && terraform init -backend=false && terraform validate); then
                echo "❌ Terraform validation failed in $dir"
                ERRORS=$((ERRORS + 1))
              fi
            done

            if [ $ERRORS -gt 0 ]; then
              echo "❌ Found $ERRORS Terraform validation errors"
              exit 1
            fi

            echo "✅ Terraform files validated"
          else
            echo "ℹ️  No Terraform files found"
          fi

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, quality-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ needs.validate.outputs.version }}

          # Extract section for this version from CHANGELOG.md
          if grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            # Extract content between this version and the next version/section
            NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)

            # Save to file for release notes
            echo "$NOTES" > release-notes.md
            echo "✅ Extracted changelog for ${VERSION}"
          else
            echo "## Release ${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release-notes.md
            echo "⚠️  No specific changelog section found, using generic notes"
          fi

          # Add footer
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "" >> release-notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md" >> release-notes.md
          echo "" >> release-notes.md
          echo "**Installation from local clone:**" >> release-notes.md
          echo "\`\`\`bash" >> release-notes.md
          echo "git clone https://github.com/${{ github.repository }}.git" >> release-notes.md
          echo "cd platform-skills" >> release-notes.md
          echo "claude plugin install ." >> release-notes.md
          echo "\`\`\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "**Marketplace install:**" >> release-notes.md
          echo "\`\`\`bash" >> release-notes.md
          echo "claude plugin marketplace add https://github.com/${{ github.repository }}" >> release-notes.md
          echo "claude plugin install ${{ env.SKILL_NAME }}" >> release-notes.md
          echo "\`\`\`" >> release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.validate.outputs.version }}" \
            --title "Platform Skills v${{ needs.validate.outputs.version }}" \
            --notes-file release-notes.md

      - name: Write source.sha to tagged commit and push to main
        run: |
          TAG_COMMIT=$(git rev-parse HEAD)
          STORED_SHA=$(jq -r '.plugins[0].source.sha' .claude-plugin/marketplace.json)

          if [ "$STORED_SHA" = "$TAG_COMMIT" ]; then
            echo "✅ source.sha already correct — nothing to commit"
            exit 0
          fi

          jq --arg sha "$TAG_COMMIT" '.plugins[0].source.sha = $sha' \
            .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: update marketplace.json source.sha to ${TAG_COMMIT}"
          git push origin HEAD:main
          echo "✅ source.sha updated to ${TAG_COMMIT} and pushed to main"

      - name: Generate release summary
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }}"
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 🚀 Release v${{ needs.validate.outputs.version }} Created

          **Tag**: \`v${{ needs.validate.outputs.version }}\`
          **Release URL**: ${RELEASE_URL}

          ### 📦 Installation

          **From local clone:**
          \`\`\`bash
          git clone https://github.com/${{ github.repository }}.git
          cd platform-skills
          claude plugin install .
          \`\`\`

          **From marketplace:**
          \`\`\`bash
          claude plugin marketplace add https://github.com/${{ github.repository }}
          claude plugin install ${{ env.SKILL_NAME }}
          \`\`\`

          ### ✅ Validation Passed

          - Version format valid
          - marketplace.json version matches tag
          - All required files present
          - Quality checks passed
          - GitHub Release created

          ### 📚 Documentation

          - [README](https://github.com/${{ github.repository }}/blob/v${{ needs.validate.outputs.version }}/README.md)
          - [CHANGELOG](https://github.com/${{ github.repository }}/blob/v${{ needs.validate.outputs.version }}/CHANGELOG.md)
          - [Examples](https://github.com/${{ github.repository }}/tree/v${{ needs.validate.outputs.version }}/examples)

          EOF

  publish-marketplace:
    name: Publish to Claude Marketplace
    runs-on: ubuntu-latest
    needs: [validate, quality-checks, create-release]
    # Only run on main repository (not forks)
    if: github.repository == 'nitinjain999/platform-skills'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Notify about marketplace publication
        run: |
          echo "📢 Ready for marketplace publication"
          echo ""
          echo "Version: v${{ needs.validate.outputs.version }}"
          echo "Repository: https://github.com/${{ github.repository }}"
          echo ""
          echo "To publish to Claude Code marketplace:"
          echo "1. Ensure you have the claude CLI installed"
          echo "2. Run: claude plugin marketplace add https://github.com/${{ github.repository }}"
          echo "3. Or submit via: https://claude.ai/marketplace/publishers"
          echo ""
          echo "The marketplace will validate:"
          echo "  ✅ Repository is public"
          echo "  ✅ marketplace.json is valid"
          echo "  ✅ Required files present"
          echo "  ✅ Examples are working"

      # Uncomment when Claude Code marketplace API/CLI is available
      # - name: Publish to Claude Marketplace
      #   env:
      #     CLAUDE_API_KEY: ${{ secrets.CLAUDE_MARKETPLACE_TOKEN }}
      #   run: |
      #     # Install Claude Code CLI if not present
      #     if ! command -v claude-code &> /dev/null; then
      #       curl -fsSL https://claude.ai/install.sh | sh
      #     fi
      #
      #     # Authenticate
      #     echo "$CLAUDE_API_KEY" | claude-code auth login --token-stdin
      #
      #     # Publish skill
      #     claude-code skill publish . --version ${{ needs.validate.outputs.version }}

      - name: Create marketplace publication summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 📢 Marketplace Publication

          ### Manual Publication Steps

          Since automated marketplace publication is not yet configured, follow these steps:

          1. **Install from local clone:**
             \`\`\`bash
             git clone https://github.com/${{ github.repository }}
             cd platform-skills
             git checkout v${{ needs.validate.outputs.version }}
             claude plugin install .
             \`\`\`

          2. **Install from marketplace:**
             \`\`\`bash
             claude plugin marketplace add https://github.com/${{ github.repository }}
             claude plugin install ${{ env.SKILL_NAME }}
             \`\`\`

          3. **Or submit via web:**
             - Visit: https://claude.ai/marketplace/publishers
             - Submit repository: https://github.com/${{ github.repository }}
             - Version will be detected from tag: v${{ needs.validate.outputs.version }}

          ### Marketplace Checklist

          - [x] Version tagged (v${{ needs.validate.outputs.version }})
          - [x] GitHub Release created
          - [x] Quality checks passed
          - [ ] Published to marketplace (manual step)
          - [ ] Marketplace listing verified

          EOF

  notify:
    name: Post-Release Notifications
    runs-on: ubuntu-latest
    needs: [validate, create-release, publish-marketplace]
    if: always()
    steps:
      - name: Release summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 🎉 Release v${{ needs.validate.outputs.version }} Complete

          ### Status

          - ✅ Version validated
          - ✅ Quality checks passed
          - ✅ GitHub Release created
          - ⏳ Marketplace publication pending (see above)

          ### Next Steps

          1. **Verify GitHub Release**: Check [releases page](https://github.com/${{ github.repository }}/releases)
          2. **Publish to Marketplace**: Follow marketplace publication steps
          3. **Announce Release**: Share with community
          4. **Monitor Issues**: Watch for user feedback

          ### User Installation

          Once marketplace publication is complete, users can install:

          \`\`\`bash
          claude plugin marketplace add https://github.com/${{ github.repository }}
          claude plugin install ${{ env.SKILL_NAME }}
          \`\`\`

          ### Documentation

          - **README**: https://github.com/${{ github.repository }}/blob/v${{ needs.validate.outputs.version }}/README.md
          - **Changelog**: https://github.com/${{ github.repository }}/blob/v${{ needs.validate.outputs.version }}/CHANGELOG.md
          - **Examples**: https://github.com/${{ github.repository }}/tree/v${{ needs.validate.outputs.version }}/examples
          - **Release Notes**: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }}

          EOF
