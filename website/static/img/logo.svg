<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="center-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon (flat-top, radius 44) -->
  <polygon
    points="50,6 88.1,28 88.1,72 50,94 11.9,72 11.9,28"
    fill="url(#hex-grad)"
    fill-opacity="0.10"
    stroke="url(#hex-grad)"
    stroke-width="3.5"
    stroke-linejoin="round"
  />

  <!-- Circuit lines: center → midpoint of each edge -->
  <!-- top-left edge mid  -->  <line x1="50" y1="50" x2="30.95" y2="17"  stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <!-- top-right edge mid -->  <line x1="50" y1="50" x2="69.05" y2="17"  stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <!-- right edge mid      -->  <line x1="50" y1="50" x2="88.1"  y2="50"  stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <!-- bottom-right edge   -->  <line x1="50" y1="50" x2="69.05" y2="83"  stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <!-- bottom-left edge    -->  <line x1="50" y1="50" x2="30.95" y2="83"  stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <!-- left edge mid       -->  <line x1="50" y1="50" x2="11.9"  y2="50"  stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>

  <!-- Edge nodes -->
  <circle cx="30.95" cy="17"   r="3.5" fill="#a78bfa"/>
  <circle cx="69.05" cy="17"   r="3.5" fill="#a78bfa"/>
  <circle cx="88.1"  cy="50"   r="3.5" fill="#a78bfa"/>
  <circle cx="69.05" cy="83"   r="3.5" fill="#a78bfa"/>
  <circle cx="30.95" cy="83"   r="3.5" fill="#a78bfa"/>
  <circle cx="11.9"  cy="50"   r="3.5" fill="#a78bfa"/>

  <!-- Center hub -->
  <circle cx="50" cy="50" r="10" fill="url(#center-grad)"/>
  <circle cx="50" cy="50" r="4.5" fill="#ede9fe"/>
</svg>
